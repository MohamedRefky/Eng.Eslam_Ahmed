<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/Eslam-Ahmed-Portfolio/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Eng Eslam Ahmed - Civil Engineer & Structural Design Engineer">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <!-- Suppress deprecated unload event warning from Flutter web engine -->
  <meta http-equiv="Permissions-Policy" content="unload=()">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Eng Eslam Ahmed">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="Eslam_Ahmed.jpg"/>

  <title>Eng Eslam Ahmed</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Font for splash -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0A0E1A;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* ── Splash Screen ─────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0A0E1A;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Profile image with rotating gradient ring */
    .splash-avatar-wrapper {
      position: relative;
      width: 140px;
      height: 140px;
      animation: avatarEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: scale(0.7);
    }

    @keyframes avatarEntry {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .splash-avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #00DCFF,
        #0066FF,
        #00FF7F,
        #0066FF,
        #00DCFF
      );
      animation: ringRotate 3s linear infinite;
    }

    @keyframes ringRotate {
      to { transform: rotate(360deg); }
    }

    .splash-avatar-ring::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #0A0E1A;
    }

    .splash-avatar-img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0A0E1A;
    }

    /* Glow behind avatar */
    .splash-avatar-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 220, 255, 0.15) 0%, transparent 70%);
      animation: glowPulse 2s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      from { opacity: 0.5; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1.05); }
    }

    /* Name text */
    .splash-name {
      margin-top: 28px;
      color: #FFFFFF;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      animation: nameEntry 0.7s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(16px);
    }

    @keyframes nameEntry {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Tagline */
    .splash-tagline {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #00DCFF, #0066FF, #00FF7F);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: nameEntry 0.7s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(16px);
    }

    /* Progress bar */
    .splash-progress {
      margin-top: 36px;
      width: 120px;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
      animation: nameEntry 0.5s 0.7s ease forwards;
      opacity: 0;
      transform: translateY(16px);
    }

    .splash-progress-bar {
      height: 100%;
      width: 30%;
      border-radius: 2px;
      background: linear-gradient(90deg, #00DCFF, #0066FF);
      animation: progressSlide 1.2s ease-in-out infinite;
    }

    @keyframes progressSlide {
      0% { transform: translateX(-100%); width: 30%; }
      50% { width: 60%; }
      100% { transform: translateX(400%); width: 30%; }
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .splash-avatar-wrapper {
        width: 110px;
        height: 110px;
      }
      .splash-name {
        font-size: 18px;
        letter-spacing: 4px;
      }
      .splash-tagline {
        font-size: 10px;
        letter-spacing: 2px;
      }
    }
  </style>

  <script>
    const originalWarn = console.warn;
    const suppressPatterns = [
      'Intl.v8BreakIterator',
      'Session History Item Has Been Marked Skippable',
      'history manipulation intervention'
    ];

    console.warn = function (...args) {
      if (args[0] && typeof args[0] === 'string' && suppressPatterns.some(p => args[0].includes(p))) {
        return;
      }
      originalWarn.apply(console, args);
    };
  </script>
</head>
<body>
  <!-- Splash Screen (visible while Flutter loads) -->
  <div id="splash">
    <div class="splash-avatar-wrapper">
      <div class="splash-avatar-glow"></div>
      <div class="splash-avatar-ring"></div>
      <img
        class="splash-avatar-img"
        src="Eslam_Ahmed.jpg"
        alt="Eslam Ahmed"
      />
    </div>
    <div class="splash-name">Eng Eslam Ahmed</div>
    <div class="splash-tagline">Structural Design Engineer</div>
    <div class="splash-progress">
      <div class="splash-progress-bar"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Called from Flutter via dart:js_interop to dismiss the splash
    function hideSplash() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(function() {
          splash.remove();
        }, 700);
      }
    }
  </script>
</body>
</html>
